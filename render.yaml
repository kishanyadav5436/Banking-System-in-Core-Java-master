services:
  # ----------------------------------------
  # 1. Spring Boot Backend (Docker)
  # ----------------------------------------
  - type: web
    name: banksystem-backend
    env: docker
    rootDir: Backend
    envVars:
      - key: PORT
        value: 8080

  # ----------------------------------------
  # 2. React Frontend (Static Site)
  # ----------------------------------------
  - type: web
    name: banksystem-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20
      # You will need to manually set VITE_API_URL in the Render dashboard 
      # once the backend URL is generated!
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
